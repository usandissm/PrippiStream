name: Update channel domains

on:
  workflow_dispatch:
  schedule:
    - cron: '30 17 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests --quiet

      - name: Update channel domains
        run: python tools/updateDomains.py

      - name: Check for domain changes
        id: check_changes
        run: |
          if git diff --quiet channels.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No domain changes — skipping release."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Domain changes detected — will release."
          fi

      - name: Rebuild addon ZIP, addons.xml e repository ZIP
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          python tools/make_addon_zip.py
          python tools/make_addons_xml.py
          python tools/make_repo_zip.py

      - name: Commit & Push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.json docs/
          git diff --staged --quiet && echo "Nessuna modifica." || \
            git commit -m "Aggiornamento domini [skip ci]"
          git push
