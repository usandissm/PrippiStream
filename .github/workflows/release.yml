name: Build and Release

# Triggered on every push to main BY A HUMAN.
# Bot commits (from this same workflow or updateDomains) include "[skip ci]"
# so GitHub Actions skips them automatically.
# The extra `github.actor` check is belt-and-suspenders safety.
on:
  push:
    branches: [main]

jobs:
  release:
    if: "github.actor != 'github-actions[bot]'"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests --quiet

      - name: Bump patch version in addon.xml
        id: version
        run: |
          NEW_VER=$(python tools/bump_version.py)
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "Nuova versione: $NEW_VER"

      - name: Build addon ZIP
        run: python tools/make_addon_zip.py

      - name: Generate addons.xml and MD5
        run: python tools/make_addons_xml.py

      - name: Build repository ZIP
        run: python tools/make_repo_zip.py

      - name: Commit and push release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addon.xml docs/
          git diff --staged --quiet && echo "Nessuna modifica da committare." || \
            git commit -m "Release v${{ steps.version.outputs.version }} [skip ci]"
          git push
